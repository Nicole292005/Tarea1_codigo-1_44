<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CinePlus - Películas en Cartelera</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <div id="navbar-container"></div>

  <!-- ALERTA DE BIENVENIDA (una sola vez - localStorage) -->
  <div id="alerta-bienvenida" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
      <div>
        <strong style="color:#fff; font-size:1.1rem;">🎬 ¡Bienvenido a CinePlus!</strong>
        <p style="color:#bbb; font-size:0.9rem; margin:8px 0 0;">Explora los mejores estrenos y clásicos del cine. ¡Disfruta la experiencia!</p>
      </div>
      <button onclick="cerrarBienvenida()" style="background:none;border:none;color:#999;font-size:1.3rem;cursor:pointer;margin-left:12px;">✕</button>
    </div>
  </div>

  <!-- MAIN -->
  <main class="container py-3">
    <!-- SPINNER (visible durante 5 seg) -->
    <div id="spinner-container">
      <div class="custom-spinner"></div>
      <p style="color: var(--color-muted);">Cargando películas...</p>
    </div>

    <!-- GALERÍA DE PELÍCULAS -->
    <div class="row" id="lista-peliculas" style="display:none;"></div>
  </main>

  <!-- MODAL TRÁILER -->
  <div class="modal fade" id="modalTrailer" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-trailer-titulo"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-0">
          <div class="ratio ratio-16x9">
            <iframe id="modal-trailer-iframe" src="" allowfullscreen></iframe>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer-container"></div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
